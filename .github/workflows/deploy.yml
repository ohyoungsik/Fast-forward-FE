name: api를 aws linux에 배포하기

on:
  push:
    branches: ["dev"] # dev 브렌치에 push될 때 아래의 job 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} # 이게 동작하기 위해서는 github 에 secrets 가 등록이 되어 있어야한다
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v5

      # 2. SSH 키 설정
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # 3. EC2 서버에 배포 명령 실행
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/fornt-test
            git pull origin dev
            npm install
            # npm run build
            nohup npm run dev --host 0.0.0.0 --port 5173 > frontend.log 2>&1 &
            # source venv39/bin/activate
            # pip install --upgrade pip
            # pip install -r requirements.txt
            # sudo systemctl restart fastapi
            # fuser -k 8000/tcp || true
            # nohup python3.9 -m uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
          EOF
      
