name: api를 aws linux에 배포하기

on:
  push:
    branches: ["dev"] # dev 브렌치에 push될 때 아래의 job 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ssh 원격 명령
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            cd ~/fornt-test
            git pull origin dev
            npm install
            npm run dev --host 0.0.0.0 --port 5173
