name: FRONT CI/CD Pipeline

on:
  push:
    branches: ["feature/cicd"] # dev 브렌치에 push될 때 아래의 job 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} # 이게 동작하기 위해서는 github 에 secrets 가 등록이 되어 있어야한다
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      # 1. 소스코드 체크아웃(GitHub Actions 러너가 현재 저장소 코드를 가져오는 단계)
      - uses: actions/checkout@v5

      # 2. Node.js 설치 및 프론트엔드 빌드
      - name: Build frontend
        run: |
          npm ci
          npm run build

      # 3. SSH 키 설정
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts

      # 빌드 결과(dist/)를 Bastion 서버의 /tmp/frontend-dist에 복사(임시저장)
      - name: Copy build to Bastion
        run: |
          scp -i ~/.ssh/id_rsa -r dist ubuntu@${{ secrets.BASTION_HOST }}:/tmp/frontend-dist
            
      # 액션과 동시에 EC2생성시에는 공개키를 AWS에서 넣어주기 때문에 가능하나
      # (ermission denied (publickey):공개키 미일치)
      # 미리 생성된 EC2에는 .ssh/authorized_keys 파일에 공개키가 등록되어 있어야한다

      # 3. EC2 서버에 배포 명령 실행
      - name: Deploy to Private Nginx
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.BASTION_HOST }} \
          "scp -r /tmp/frontend-dist ubuntu@172.16.20.10:/var/www/html && ssh ubuntu@172.16.20.10 'sudo systemctl restart nginx'"
          
          
